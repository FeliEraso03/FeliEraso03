<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#200000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="mg" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="50%" stop-color="#7b0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="30%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="pgbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b0000"/>
      <stop offset="100%" stop-color="#ff5733"/>
    </linearGradient>
    <filter id="red-glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes tw1{0%,100%{opacity:.1}50%{opacity:.85}}
      @keyframes tw2{0%,100%{opacity:.7}50%{opacity:.08}}
      @keyframes tw3{0%,100%{opacity:.3}50%{opacity:.75}}
      @keyframes tw4{0%,100%{opacity:.15}50%{opacity:.55}}
      @keyframes fl{0%,100%{transform:translateY(0px)}50%{transform:translateY(-7px)}}
      @keyframes pg{from{stroke-dashoffset:760}to{stroke-dashoffset:0}}
      @keyframes fadein{0%{opacity:0}1%{opacity:0}100%{opacity:1}}

      @keyframes l1{0%{opacity:0}2%{opacity:1}10%{opacity:1}12%{opacity:0}100%{opacity:0}}
      @keyframes l2{0%,12%{opacity:0}13%{opacity:1}22%{opacity:1}23%{opacity:0}100%{opacity:0}}
      @keyframes l3{0%,25%{opacity:0}26%{opacity:1}32%{opacity:1}33%{opacity:0}100%{opacity:0}}
      @keyframes l4{0%,34%{opacity:0}35%{opacity:1}43%{opacity:1}44%{opacity:0}100%{opacity:0}}
      @keyframes l5{0%,45%{opacity:0}46%{opacity:1}54%{opacity:1}55%{opacity:0}100%{opacity:0}}
      @keyframes l6{0%,56%{opacity:0}57%{opacity:1}67%{opacity:1}68%{opacity:0}100%{opacity:0}}
      @keyframes l7{0%,70%{opacity:0}71%{opacity:1}78%{opacity:1}79%{opacity:0}100%{opacity:0}}
      @keyframes l8{0%,81%{opacity:0}82%{opacity:1}85%{opacity:1}86%{opacity:0}100%{opacity:0}}
      @keyframes l9{0%,87%{opacity:0}88%{opacity:1}98%{opacity:1}100%{opacity:0}}
    </style>
  </defs>

  <!-- Base black + red radial -->
  <rect width="800" height="400" fill="#000"/>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="45"  cy="28"  r="1.0" fill="#ffcfb5" style="animation:tw1 3.2s ease-in-out infinite"/>
  <circle cx="118" cy="15"  r="1.4" fill="#fff0e5" style="animation:tw2 2.8s ease-in-out infinite .4s"/>
  <circle cx="195" cy="42"  r="0.8" fill="#ffddd0" style="animation:tw3 3.8s ease-in-out infinite 1.1s"/>
  <circle cx="280" cy="22"  r="1.2" fill="#ffe5d5" style="animation:tw1 2.5s ease-in-out infinite 2.1s"/>
  <circle cx="352" cy="10"  r="0.9" fill="#fff5ee" style="animation:tw4 4.1s ease-in-out infinite .7s"/>
  <circle cx="420" cy="35"  r="1.1" fill="#ffcfb5" style="animation:tw2 3.5s ease-in-out infinite 1.5s"/>
  <circle cx="510" cy="18"  r="1.3" fill="#ffe8d8" style="animation:tw1 2.9s ease-in-out infinite .9s"/>
  <circle cx="590" cy="30"  r="0.8" fill="#fff0e5" style="animation:tw3 3.3s ease-in-out infinite 2.3s"/>
  <circle cx="662" cy="14"  r="1.2" fill="#ffcfb5" style="animation:tw4 4.5s ease-in-out infinite 1.8s"/>
  <circle cx="740" cy="28"  r="1.0" fill="#ffddd0" style="animation:tw2 2.7s ease-in-out infinite .3s"/>
  <circle cx="762" cy="55"  r="0.8" fill="#ffe5d5" style="animation:tw1 3.9s ease-in-out infinite 2.7s"/>
  <circle cx="672" cy="75"  r="1.1" fill="#fff0e5" style="animation:tw3 3.1s ease-in-out infinite 1.2s"/>
  <circle cx="580" cy="55"  r="0.9" fill="#ffcfb5" style="animation:tw4 2.6s ease-in-out infinite .6s"/>
  <circle cx="490" cy="65"  r="1.3" fill="#ffe8d8" style="animation:tw2 4.3s ease-in-out infinite 3.1s"/>
  <circle cx="382" cy="50"  r="0.8" fill="#fff5ee" style="animation:tw1 3.6s ease-in-out infinite 1.9s"/>
  <circle cx="302" cy="68"  r="1.2" fill="#ffddd0" style="animation:tw3 2.4s ease-in-out infinite .2s"/>
  <circle cx="200" cy="60"  r="1.0" fill="#ffe5d5" style="animation:tw4 4.0s ease-in-out infinite 2.8s"/>
  <circle cx="100" cy="70"  r="0.9" fill="#ffcfb5" style="animation:tw2 3.4s ease-in-out infinite 1.6s"/>
  <circle cx="25"  cy="82"  r="1.4" fill="#fff0e5" style="animation:tw1 2.3s ease-in-out infinite 3.5s"/>
  <circle cx="30"  cy="158" r="0.8" fill="#ffe8d8" style="animation:tw3 3.7s ease-in-out infinite .8s"/>
  <circle cx="754" cy="155" r="1.1" fill="#ffcfb5" style="animation:tw2 4.2s ease-in-out infinite 2.2s"/>
  <circle cx="766" cy="258" r="0.9" fill="#ffddd0" style="animation:tw4 3.0s ease-in-out infinite 1.4s"/>
  <circle cx="33"  cy="255" r="1.3" fill="#ffe5d5" style="animation:tw1 3.5s ease-in-out infinite 3.0s"/>
  <circle cx="22"  cy="325" r="0.8" fill="#fff5ee" style="animation:tw2 2.8s ease-in-out infinite .5s"/>
  <circle cx="778" cy="315" r="1.0" fill="#ffcfb5" style="animation:tw3 4.1s ease-in-out infinite 2.6s"/>
  <circle cx="140" cy="344" r="0.9" fill="#ffe8d8" style="animation:tw4 3.3s ease-in-out infinite 1.7s"/>
  <circle cx="700" cy="340" r="1.1" fill="#ffddd0" style="animation:tw1 2.6s ease-in-out infinite .1s"/>
  <circle cx="650" cy="285" r="0.8" fill="#ffe5d5" style="animation:tw2 3.8s ease-in-out infinite 3.3s"/>

  <!-- Vignette -->
  <rect width="800" height="400" fill="url(#vig)"/>

  <!-- Scan lines subtle -->
  <rect width="800" height="400" fill="none" opacity="0.03"
        style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,#000 2px,#000 4px)"/>

  <!-- Cinematic black bars -->
  <rect x="0" y="0"   width="800" height="55" fill="#000"/>
  <rect x="0" y="345" width="800" height="55" fill="#000"/>

  <!-- Artist label -->
  <text x="400" y="33"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        font-weight="300"
        letter-spacing="7"
        fill="#ffffff"
        opacity="0.3"
        style="animation:fadein 2s .5s both">
    DAMIANO DAVID
  </text>

  <!-- Song label -->
  <text x="772" y="370"
        text-anchor="end"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9"
        font-weight="300"
        letter-spacing="5"
        fill="#ff5a32"
        opacity="0.4"
        style="animation:fadein 2s 1s both">
    MARS  ·  2025
  </text>

  <!-- Planet Mars (floating) -->
  <g style="animation:fl 4s ease-in-out 2.7s infinite">
    <circle cx="55" cy="308" r="32" fill="url(#mg)"/>
    <ellipse cx="50" cy="328" rx="22" ry="7" fill="#000" opacity="0.5"/>
  </g>

  <!-- Progress bar (animated stroke-dashoffset) -->
  <line x1="20" y1="344" x2="780" y2="344"
        stroke="url(#pgbar)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="760"
        style="animation:pg 45s linear infinite"/>

  <!-- ── LYRIC LINES ── all centered at y=200 -->

  <!-- l1 · s1 · I don't need to live forever -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="26" font-weight="900" letter-spacing="3"
        fill="#ffffff" filter="url(#soft-glow)"
        style="opacity:0;animation:l1 45s ease-in-out infinite">
    I DON'T NEED TO LIVE FOREVER
  </text>

  <!-- l2 · s2 · As long as I can die in your arms -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="30" font-weight="900" letter-spacing="2"
        fill="#ffffff" filter="url(#soft-glow)"
        style="opacity:0;animation:l2 45s ease-in-out infinite">
    AS LONG AS I CAN DIE IN YOUR ARMS
  </text>

  <!-- l3 · s3 · I don't need a different planet -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" font-weight="400" letter-spacing="7"
        fill="#ffffff"
        style="opacity:0;animation:l3 45s ease-in-out infinite">
    I DON'T NEED A DIFFERENT PLANET
  </text>

  <!-- l4 · s2 · Our love is staying right here with us -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="26" font-weight="900" letter-spacing="2"
        fill="#ffffff" filter="url(#soft-glow)"
        style="opacity:0;animation:l4 45s ease-in-out infinite">
    OUR LOVE IS STAYING RIGHT HERE WITH US
  </text>

  <!-- l5 · accent RED · The devil's on an Apollo mission -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="32" font-weight="900" letter-spacing="3"
        fill="#ff4422" filter="url(#red-glow)"
        style="opacity:0;animation:l5 45s ease-in-out infinite">
    THE DEVIL'S ON AN APOLLO MISSION
  </text>

  <!-- l6 · s1 · So maybe we can hang out with God -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="26" font-weight="900" letter-spacing="3"
        fill="#ffffff" filter="url(#soft-glow)"
        style="opacity:0;animation:l6 45s ease-in-out infinite">
    SO MAYBE WE CAN HANG OUT WITH GOD
  </text>

  <!-- l7 · s2 · While everybody's going to Mars -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="32" font-weight="900" letter-spacing="2"
        fill="#ffffff" filter="url(#soft-glow)"
        style="opacity:0;animation:l7 45s ease-in-out infinite">
    WHILE EVERYBODY'S GOING TO MARS
  </text>

  <!-- l8 · s3 · Everybody's going to Mars -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" font-weight="400" letter-spacing="7"
        fill="#ffffff"
        style="opacity:0;animation:l8 45s ease-in-out infinite">
    EVERYBODY'S GOING TO MARS
  </text>

  <!-- l9 · calligraphic italic serif -->
  <text x="400" y="200"
        text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48" font-weight="300" font-style="italic"
        letter-spacing="3"
        fill="#ffffff" filter="url(#soft-glow)"
        style="opacity:0;animation:l9 45s ease-in-out infinite">
    I wanna stay here with you
  </text>

</svg>
